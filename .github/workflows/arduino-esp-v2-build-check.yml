name: Build(arduino-esp32:2.x)

env:
  SKETCH_NAMES_FIND_START: ./examples/UnitUnified
  REQUIRED_LIBRARIES: M5Unified,M5UnitUnified

on:
  push:
    tags-ignore:
      - '*.*.*'
      - 'v*.*.*'
    branches:
      - '*'
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'examples/UnitUnified/**.ino'
      - 'examples/UnitUnified/**.cpp'
      - 'examples/UnitUnified/**.hpp'
      - 'examples/UnitUnified/**.h'
      - 'examples/UnitUnified/**.c'
      - '.github/workflows/arduino-esp-v2-build-check.yml'
  pull_request:
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'examples/UnitUnified/**.ino'
      - 'examples/UnitUnified/**.cpp'
      - 'examples/UnitUnified/**.hpp'
      - 'examples/UnitUnified/**.h'
      - 'examples/UnitUnified/**.c'
      - '.github/workflows/arduino-esp-v2-build-check.yml'
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.unit }}:${{ matrix.sketch }}:${{matrix.board}}@${{matrix.platform-version}}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        platform-url:
          - https://espressif.github.io/arduino-esp32/package_esp32_index.json

        sketch:
          - PlotToSerial

        unit:
          - UnitWeightI2C
          - UnitMiniScales

        board:
          - m5stack-atom
          - m5stack-atoms3
          - m5stack-core-esp32
          - m5stack-core2
          - m5stack-coreink
          - m5stack-cores3
          - m5stack-fire

        platform-version:
          - 2.0.17

        platform:
          - esp32

        archi:
          - esp32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare libraries list
        id: libs
        run: |
          {
            echo "yaml<<EOF"
            echo "$REQUIRED_LIBRARIES" | tr ',' '\n' | while read -r lib; do
              echo "- name: $lib"
            done
            echo "- source-path: ./"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compile examples
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.platform }}:${{ matrix.archi }}:${{ matrix.board }}
          platforms: |
            - name: ${{ matrix.platform }}:${{ matrix.archi }}
              source-url: ${{ matrix.platform-url }}
              version: ${{ matrix.platform-version }}
          libraries: ${{ steps.libs.outputs.yaml }}
          sketch-paths: |
            - ${{ env.SKETCH_NAMES_FIND_START }}/${{ matrix.unit }}/${{ matrix.sketch }}
